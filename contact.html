<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Hennessy Counselling - Contact</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="contact-page">

<!-- Menu Bar -->
<nav class="menu-bar">
    <img src="logo.avif" alt="Site Logo" class="logo">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="my-counselling-room.html">My Counselling Room</a>
    <a href="resources.html">Resources</a>
    <a href="contact.html">Contact</a>
</nav>

<!-- Banner -->
<div class="room-banner">
    <img src="Images/stones.jpg" alt="stones">
</div>

<!-- Contact Section -->
<section class="therapy-experience-columns">

    <div class="therapy-left">
        <img src="images/path.jpg" alt="Counselling Room">
    </div>

    <div class="therapy-right">
        <h2>Contact Me</h2>
        <form class="contact-form" action="mailto:counsellor@example.com" method="post" enctype="text/plain">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Your email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Your message" rows="6" required></textarea>

            <p>Email: counsellor@example.com<br>Phone: 01234567890</p>

            <button type="submit">Send Message</button>
        </form>
    </div>

</section>

<!-- Footer -->
<footer class="site-footer">
    <div class="footer-content">
        <p>&copy; 2026 A Hennessy Counselling. All rights reserved.</p>
    </div>
</footer>

</body>
</html>
